<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Jordanian-inspired geometric background -->
  <defs>
    <linearGradient id="jordanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c41e3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007a3d;stop-opacity:1" />
    </linearGradient>
    
    <pattern id="arabicPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M0,10 L10,0 L20,10 L10,20 Z" fill="rgba(255,255,255,0.1)" />
    </pattern>
  </defs>
  
  <!-- Main circle background with Jordanian colors -->
  <circle cx="60" cy="60" r="58" fill="url(#jordanGradient)" />
  <circle cx="60" cy="60" r="58" fill="url(#arabicPattern)" />
  <circle cx="60" cy="60" r="54" fill="#1a1a1a" />
  
  <!-- Arabic letter ع (Ayn) - stylized architectural form -->
  <g transform="translate(60, 60)">
    <!-- Main arch structure resembling Petra -->
    <path d="M -20,-15 Q -25,-5 -25,5 L -25,20 L -15,20 L -15,5 Q -15,-5 -10,-10 Q 0,-20 10,-10 Q 15,-5 15,5 L 15,20 L 25,20 L 25,5 Q 25,-5 20,-15 Q 10,-25 0,-20 Q -10,-25 -20,-15 Z" 
          fill="#c41e3a" 
          stroke="#f4d03f" 
          stroke-width="1.5"
          opacity="0.9"/>
    
    <!-- Building/home iconography integrated -->
    <rect x="-8" y="8" width="5" height="12" fill="#f4d03f" opacity="0.8"/>
    <rect x="3" y="8" width="5" height="12" fill="#f4d03f" opacity="0.8"/>
    
    <!-- Decorative geometric elements inspired by Islamic art -->
    <circle cx="-20" cy="0" r="2" fill="#007a3d" />
    <circle cx="20" cy="0" r="2" fill="#007a3d" />
    <circle cx="0" cy="-18" r="2.5" fill="#f4d03f" />
  </g>
  
  <!-- Border accent with Jordanian flag colors -->
  <circle cx="60" cy="60" r="58" fill="none" stroke="#c41e3a" stroke-width="2" />
  <circle cx="60" cy="60" r="55" fill="none" stroke="#007a3d" stroke-width="1" opacity="0.6" />
  
  <!-- Small decorative stars (7-pointed Islamic star) -->
  <g transform="translate(30, 30)" opacity="0.4">
    <path d="M0,-3 L0.9,-0.9 L3,0 L0.9,0.9 L0,3 L-0.9,0.9 L-3,0 L-0.9,-0.9 Z" fill="#f4d03f" />
  </g>
  <g transform="translate(90, 90)" opacity="0.4">
    <path d="M0,-3 L0.9,-0.9 L3,0 L0.9,0.9 L0,3 L-0.9,0.9 L-3,0 L-0.9,-0.9 Z" fill="#f4d03f" />
  </g>
</svg>
